<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepForge AI</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="brand">
            <a href="{{ url_for('index') }}">PrepForge AI</a>
        </div>
        <ul class="nav-links">
            <li><a href="{{ url_for('index') }}">Home</a></li>
            <li><a href="{{ url_for('cs_subjects') }}">CS Subjects</a></li>
            <li><a href="{{ url_for('gd_prep') }}">GD Prep</a></li>
            <li><a href="{{ url_for('hr_interview') }}">HR Interview</a></li>
            <li><a href="{{ url_for('chatbot') }}">AI Chatbot</a></li>
        </ul>
        <div class="nav-actions">
            <button id="theme-toggle">🌙</button>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer class="site-footer">
        <div class="footer-profile">
            <img src="{{ url_for('static', filename='images/profile.jpg') }}" alt="Suraj M S" class="footer-img">
            <h2>Suraj M S</h2>
            <p>Founder & Developer</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
